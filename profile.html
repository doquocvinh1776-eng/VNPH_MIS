<body class="bg-[#f4f4f4] text-on-surface">

  <script src="header-init.js"></script>
  <script src="sidebar-init.js"></script>
  <div id="header2"></div>
  <script>
    fetch("header2.html")
      .then((res) => res.text())
      .then((data) => {

        initHeader();
      });
  </script>
  <main class="max-w-[1280px] mx-auto px-8 py-10 flex gap-8">

      fetch("sidebar.html")

        .then((data) => {

    <!-- Main Content Area -->

        </div>

                </div>

              </div>
              <div class="grid grid-cols-[140px_1fr] items-center">
                <div class="flex items-center gap-2 text-slate-800">

                  <label class="text-sm">Giới Tính</label>
                </div>
                <div class="text-sm text-slate-600">Nữ</div>
              </div>
              <div class="grid grid-cols-[140px_1fr] items-center">
                <div class="flex items-center gap-2 text-slate-800">

                  <span class="material-symbols-outlined text-lg">mail</span>
                  <label class="text-sm">Email</label>
                </div>
                <div class="text-sm text-slate-600">_</div>
              </div>
              <div class="grid grid-cols-[140px_1fr] items-center">
                <div class="flex items-center gap-2 text-slate-800">
                  <span class="material-symbols-outlined text-lg">calendar_month</span>
                  <label class="text-sm">Ngày sinh</label>
                </div>
                <div class="text-sm text-slate-600">03/04/2006</div>
              </div>
              <div class="grid grid-cols-[140px_1fr] items-center">
                <div class="flex items-center gap-2 text-slate-800">
                  <span class="material-symbols-outlined text-lg">location_on</span>
                  <label class="text-sm">Tỉnh/thành phố</label>
                </div>
                <div class="text-sm text-slate-600">TP. Hồ Chí Minh</div>

  <!-- Footer -->

  <script>
    fetch("footer.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });

  <script>
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.style.display = "none";
    document.body.appendChild(fileInput);

    const chooseAvatarBtn = document.querySelector("button");

    chooseAvatarBtn.onclick = () => {
      fileInput.click();
    };

    fileInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function () {
        localStorage.setItem("avatar", reader.result);

        const avatarBox = document.querySelector(".w-24.h-24");
        avatarBox.innerHTML = `
        <img src="${reader.result}" class="w-full h-full object-cover rounded-full">
      `;

        // Cập nhật luôn avatar trên sidebar
        const sidebarAvatar = document.getElementById("sidebar-avatar");
        if (sidebarAvatar) {
          sidebarAvatar.innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover rounded-full" alt="Avatar">`;
        }
      };

      reader.readAsDataURL(file);
    });

    const editBtn = document.querySelector(".flex.justify-end.mb-4 a");

    editBtn.addEventListener("click", function (e) {
      e.preventDefault();

      const rows = document.querySelectorAll(".flex-1.space-y-5 .grid");

      rows.forEach((row) => {
        const el = row.querySelector(".text-slate-600");
        if (!el) return;

        const label = row.querySelector("label").innerText;

        // Không cho sửa dòng Hạng thành viên
        if (label === "Hạng thành viên") return;

        const value = el.innerText;
        const input = document.createElement("input");
        input.value = value;
        input.className = "border p-1 text-sm w-full edit-input";
        input.dataset.label = label;

        el.replaceWith(input);
      });

      editBtn.innerHTML = "Lưu";
      editBtn.onclick = saveProfile;
    });

    function saveProfile(e) {
      if (e) e.preventDefault();

      const inputs = document.querySelectorAll(".edit-input");
      let data = JSON.parse(localStorage.getItem("profileObj")) || {};

      inputs.forEach((input) => {
        data[input.dataset.label] = input.value;
      });

      localStorage.setItem("profileObj", JSON.stringify(data));
      alert("Đã lưu thành công!");

      location.reload();
    }

    window.addEventListener("DOMContentLoaded", () => {
      const data = JSON.parse(localStorage.getItem("profileObj"));

      if (data) {
        const rows = document.querySelectorAll(".flex-1.space-y-5 .grid");

        rows.forEach((row) => {
          const label = row.querySelector("label").innerText;
          const el = row.querySelector(".text-slate-600");

          if (el && data[label] !== undefined) {
            el.innerText = data[label];
          }
        });
      }

      const avatar = localStorage.getItem("avatar");

      if (avatar) {
        const avatarBox = document.querySelector(".w-24.h-24");
        avatarBox.innerHTML = `
        <img src="${avatar}" class="w-full h-full object-cover rounded-full">
      `;
      }
    });
  </script>
  <script src="search-global.js"></script>
</body>
