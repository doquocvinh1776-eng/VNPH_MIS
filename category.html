<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách sản phẩm | VNPH Jewelry</title>
  <meta name="description"
    content="Khám phá bộ sưu tập trang sức cao cấp VNPH với nhiều mẫu mã đa dạng, từ nhẫn kim cương đến vòng tay vàng tinh xảo." />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <style>
    body {
      font-family: "Manrope", sans-serif;
      background: #efefef;
    }

    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .cat-btn.active {
      background-color: #2b427d;
      color: white;
    }
  </style>
</head>

<body>
  <script src="products.js"></script>
  <script src="stock-sync.js"></script>
  <script src="frame_product.js"></script>
  <script src="header-init.js"></script>
  <div id="header2"></div>
  <script>
    fetch("header2.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("header2").innerHTML = data;
        if (typeof initHeader === "function") {
          initHeader();
        }
      })
      .catch((err) => console.error("Error loading header:", err));
  </script>

  <main class="max-w-[1280px] mx-auto px-8 py-10">
    <h1 class="text-3xl font-bold text-[#2B427D] mb-8 uppercase tracking-wider text-center">DANH SÁCH SẢN PHẨM</h1>

    <div id="category-filter" class="flex flex-wrap justify-center gap-3 mb-12">
      <button onclick="filterByCategory('All')"
        class="cat-btn active px-6 py-2 rounded-full border-2 border-[#2B427D] text-[#2B427D] font-bold transition-all hover:bg-[#2B427D] hover:text-white">Tất
        cả</button>
    </div>

    <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-7"></div>
  </main>

  <script>
    function removeVN(str) {
      return str
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D");
    }

    let currentCategory = 'All';

    function renderProducts(list, rawKeyword = "") {
      const container = document.getElementById("product-list");
      renderProductCards(list, container, { highlightKeyword: rawKeyword });
    }

    function filterByCategory(cat) {
      currentCategory = cat;

      document.querySelectorAll('.cat-btn').forEach(btn => {
        if (btn.innerText === cat || (cat === 'All' && btn.innerText === 'Tất cả')) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      let filtered = products;
      if (cat !== 'All') {
        filtered = products.filter(p => p.category === cat);
      }

      renderProducts(filtered);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const catContainer = document.getElementById("category-filter");
      const categories = [...new Set(products.map(p => p.category).filter(Boolean))];

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn px-6 py-2 rounded-full border-2 border-[#2B427D] text-[#2B427D] font-bold transition-all hover:bg-[#2B427D] hover:text-white";
        btn.innerText = cat;
        btn.onclick = () => filterByCategory(cat);
        catContainer.appendChild(btn);
      });

      const params = new URLSearchParams(window.location.search);
      const raw = params.get("search") || "";
      const keyword = removeVN(raw.toLowerCase());

      if (keyword) {
        const results = products.filter((p) => {
          return removeVN((p.title || "").toLowerCase()).includes(keyword);
        });
        renderProducts(results, raw);
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      } else {
        renderProducts(products.slice(0, 24));
      }

      document.addEventListener("click", function (e) {
        const card = e.target.closest(".product-card");
        if (!card) return;

        const product = products.find((p) => p.id === card.dataset.id);
        if (!product) return;

        localStorage.setItem("selectedProduct", JSON.stringify(product));
        
        let viewed = JSON.parse(localStorage.getItem("viewed") || "[]");
        viewed = viewed.filter((item) => item.id !== product.id);
        viewed.unshift(product);
        localStorage.setItem("viewed", JSON.stringify(viewed));

        window.location.href = "product-detail.html";
      });
    });
  </script>

  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
  <script src="search-global.js"></script>
</body>

</html>
