<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng | VNPH</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <style>
    body {
      font-family: "Manrope", sans-serif;
      background-color: #f4f7f9;
    }

    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }
  </style>
</head>

<body>
  <script src="products.js"></script>
  <script src="database.js"></script>

  <script src="header-init.js"></script>
  <div id="header2"></div>
  <script>
    fetch("header2.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("header2").innerHTML = data;
        initHeader();
      });
  </script>

  <main class="max-w-[1280px] mx-auto px-8 py-12">
    <div
      class="max-w-[860px] mx-auto bg-white border border-gray-200 rounded-sm p-12 shadow-sm min-h-[600px] flex flex-col">
      <div class="mb-8">
        <a class="flex items-center text-xs text-gray-500 hover:text-[#2B427D]" href="index.html">
          <span class="material-symbols-outlined text-sm mr-1">
            arrow_back
          </span>
          Quay lại
        </a>
      </div>

      <h2 class="text-3xl font-light text-center text-[#2B427D] tracking-widest mb-12 uppercase">
        GIỎ HÀNG
      </h2>

      <div class="flex-1" id="cart-container">
        <div class="space-y-8" id="cart-items-list"></div>

        <div class="hidden text-center py-20 text-gray-500" id="empty-cart-msg">
          Giỏ hàng của bạn đang trống
        </div>
      </div>

      <div class="mt-12 pt-8 border-t border-gray-100 w-full max-w-[320px] ml-auto hidden" id="cart-summary">
        <div class="flex justify-between text-sm mb-3">
          <span class="text-gray-600">Tạm tính</span>
          <span class="font-bold text-[#2B427D]" id="subtotal">0đ</span>
        </div>

        <div class="flex justify-between text-sm mb-3">
          <span class="text-gray-600">Giảm giá</span>
          <span class="font-bold text-red-500" id="discount">-0đ</span>
        </div>

        <div class="flex justify-between text-lg mb-8 font-bold text-[#2B427D]">
          <span>Tổng tiền</span>
          <span id="total-price">0đ</span>
        </div>

        <a class="block w-full bg-[#102B65] text-white py-4 text-center font-bold text-sm hover:opacity-90 transition-opacity rounded-sm tracking-[0.2em] uppercase"
          href="checkout.html">
          TIẾP TỤC
        </a>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    fetch("footer.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <script src="search-global.js"></script>

  <script>
    function formatPrice(num) {
      return new Intl.NumberFormat("vi-VN").format(num) + "đ";
    }

    function parsePrice(priceStr) {
      if (typeof priceStr === "number") return priceStr;
      if (!priceStr) return 0;
      return parseInt(String(priceStr).replace(/[^\d]/g, "")) || 0;
    }

    function updateCart() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const container = document.getElementById("cart-items-list");
      const emptyMsg = document.getElementById("empty-cart-msg");
      const summary = document.getElementById("cart-summary");

      if (cart.length === 0) {
        container.innerHTML = "";
        emptyMsg.classList.remove("hidden");
        summary.classList.add("hidden");
        localStorage.removeItem("cart_summary");
        return;
      }

      emptyMsg.classList.add("hidden");
      summary.classList.remove("hidden");

      let html = "";
      let subtotal = 0;

      cart.forEach((item, index) => {
        const dbProduct = getProductById(item.id);
        const stock = dbProduct ? dbProduct.stock : 0;

        const itemPrice = parsePrice(item.price);
        const itemQty = item.quantity || 1;
        subtotal += itemPrice * itemQty;

        html += `
            <div class="flex items-center py-6 border-b border-gray-50 last:border-0">
              <div class="w-24 h-24 bg-gray-100 rounded overflow-hidden mr-6">
                <img
                  alt="${item.title}"
                  class="w-full h-full object-cover"
                  src="${item.img}"
                />
              </div>

              <div class="flex-1">
                <h3 class="text-sm font-medium text-[#2B427D] mb-1">
                  ${item.title}
                </h3>

                <p class="text-[10px] text-gray-400 mb-2 uppercase">
                  SKU: ${item.id || "N/A"}
                </p>

                <p class="text-xs mb-3 ${stock <= 0 ? "text-red-500" : "text-green-600"
          }">
                  Tồn kho: ${stock}
                </p>

                <div class="flex items-center border border-gray-200 w-fit rounded-sm overflow-hidden">
                  <button
                    class="px-3 py-1 hover:bg-gray-50 text-gray-500"
                    onclick="changeQty(${index}, -1)"
                  >
                    -
                  </button>

                  <input
                    class="w-10 text-center text-xs border-x border-gray-200 py-1 bg-transparent"
                    readonly
                    type="text"
                    value="${itemQty}"
                  />

                  <button
                    class="px-3 py-1 hover:bg-gray-50 text-gray-500"
                    onclick="changeQty(${index}, 1)"
                  >
                    +
                  </button>
                </div>
              </div>

              <div class="text-right flex flex-col justify-between h-24 py-2">
                <div class="text-md font-bold text-[#d88900]">
                  ${formatPrice(itemPrice * itemQty)}
                </div>

                <button
                  class="flex items-center justify-end text-[10px] text-gray-400 hover:text-red-500 transition-colors uppercase mt-auto"
                  onclick="removeItem(${index})"
                >
                  <span class="material-symbols-outlined text-sm mr-1">
                    delete
                  </span>
                  Xóa
                </button>
              </div>
            </div>
          `;
      });

      container.innerHTML = html;

      const discount = subtotal > 10000000 ? Math.floor(subtotal * 0.05) : 0;
      const total = subtotal - discount;

      document.getElementById("subtotal").innerText = formatPrice(subtotal);
      document.getElementById("discount").innerText =
        discount > 0 ? "-" + formatPrice(discount) : "0đ";
      document.getElementById("total-price").innerText = formatPrice(total);

      localStorage.setItem(
        "cart_summary",
        JSON.stringify({
          subtotal,
          discount,
          total,
        }),
      );
    }

    function changeQty(index, delta) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");

      const item = cart[index];
      const dbProduct = getProductById(item.id);

      if (!dbProduct) {
        alert("Không tìm thấy sản phẩm trong kho!");
        return;
      }

      if (!item.quantity) item.quantity = 1;

      if (delta > 0 && item.quantity + 1 > dbProduct.stock) {
        alert("Số lượng vượt quá hàng tồn kho!");
        return;
      }

      item.quantity += delta;

      if (item.quantity < 1) item.quantity = 1;

      localStorage.setItem("cart", JSON.stringify(cart));
      updateCart();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCart();
    }

    document.addEventListener("DOMContentLoaded", updateCart);
  </script>
</body>

</html>
