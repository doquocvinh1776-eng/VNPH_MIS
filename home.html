<!doctype html>

<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>PNJ Jewelry | Timeless Prestige &amp; Modern Craftsmanship</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: "Manrope", sans-serif;
      background-color: #fcf9f8;
    }

    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }
  </style>
</head>

<body class="bg-surface font-manrope">
  <!-- Top Navigation Bar -->
  <script src="header-init.js"></script>
  <div id="header2"></div>
  <script>
    fetch("header2.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("header2").innerHTML = data;
        if (typeof initHeader === "function") {
          initHeader();
        }
      })
      .catch((err) => console.error("Error loading header:", err));
  </script>
  <main>
    <!-- Hero Slider / Banner -->
    <section class="max-w-[1280px] mx-auto h-[400px] relative overflow-hidden bg-primary rounded-xl mt-6">
      <img alt="Luxurious golden necklace on a minimalist silk background"
        class="absolute inset-0 w-full h-full object-cover opacity-90" src="img_web/Banner.png" />
    </section>
    <div id="product-sections" class="max-w-[1280px] mx-auto px-8 py-16 space-y-20"></div>
  </main>
  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
  <script src="products.js"></script>
  <script src="stock-sync.js"></script>
  <script src="frame_got.js"></script>
  <script src="frame_product.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderSectionFrames("#product-sections", [
        { id: "section-viewed", title: "Sản phẩm đã xem" },
        { id: "section-new", title: "Sản phẩm mới" },
        { id: "section-bestseller", title: "Sản phẩm bán chạy" },
      ]);

      const newProducts = products.slice(0, 8);
      const bestProducts = products.slice(8, 16);
      const viewedProducts = JSON.parse(localStorage.getItem("viewed") || "[]");

      renderProductCards(viewedProducts.slice(0, 4), document.querySelector("#section-viewed .grid"));
      renderProductCards(newProducts, document.querySelector("#section-new .grid"));
      renderProductCards(bestProducts, document.querySelector("#section-bestseller .grid"), { isBest: true });

      document.addEventListener("click", function (e) {
        const card = e.target.closest(".product-card");
        if (!card) return;

        const productId = card.dataset.id;
        const product = products.find((p) => p.id === productId);

        if (!product) return;

        if (e.target.closest(".add-to-cart-btn")) {
          let cart = JSON.parse(localStorage.getItem("cart") || "[]");
          const existing = cart.find((item) => item.id === product.id);

          if (existing) {
            existing.quantity++;
          } else {
            cart.push({
              id: product.id,
              title: product.title,
              price: product.price,
              img: "images/" + product.images[0],
              quantity: 1,
            });
          }

          localStorage.setItem("cart", JSON.stringify(cart));
          alert("Đã thêm vào giỏ!");
          return;
        }

        let viewed = JSON.parse(localStorage.getItem("viewed") || "[]");
        viewed = viewed.filter((item) => item.id !== product.id);
        viewed.unshift(product);
        localStorage.setItem("viewed", JSON.stringify(viewed));

        localStorage.setItem("selectedProduct", JSON.stringify(product));
        window.location.href = "product-detail.html";
      });
    });
  </script>
  <script src="search-global.js"></script>
</body>

</html>
