<header class="bg-white sticky top-0 z-50 shadow-sm">
  <!-- Top Header with Logo Centered -->
  <div class="border-b border-gray-100">
    <div class="flex justify-between items-center w-full px-8 py-4 max-w-[1280px] mx-auto">
      <div class="flex-1 flex items-center space-x-6">
        <span class="material-symbols-outlined text-primary cursor-pointer">
          menu
        </span>

        <div class="relative w-full max-w-xs">
          <input
            class="w-full pl-4 pr-10 py-2 bg-gray-100 rounded-xl border-none text-sm focus:ring-1 focus:ring-primary"
            placeholder="Tìm kiếm nhanh" type="text" />
          <span class="material-symbols-outlined absolute right-3 top-2 text-on-surface-variant text-xl">
            search
          </span>
        </div>
      </div>

      <!-- ✅ LOGO ĐÃ ĐỔI -->
      <div class="flex-1 flex justify-center items-center space-x-2">
        <a href="home.html" class="flex items-center space-x-2">
          <img src="img_web/logofull.svg" class="h-10" />
        </a>
      </div>

      <div class="flex-1 flex justify-end items-center space-x-8">

        <div class="flex flex-col items-center cursor-pointer group">
          <span class="material-symbols-outlined text-primary group-hover:opacity-70 transition-opacity">
            person
          </span>
          <span class="text-[10px] uppercase font-bold text-primary">
            Tài khoản
          </span>
        </div>

        <a class="flex flex-col items-center cursor-pointer group" href="cart.html">
          <span class="material-symbols-outlined text-primary group-hover:opacity-70 transition-opacity">
            shopping_bag
          </span>
          <span class="text-[10px] uppercase font-bold text-primary">
            Giỏ hàng
          </span>
        </a>
      </div>
    </div>
  </div>

  <!-- Sub Header -->
  <div class="bg-[#FFFBEB] border-b border-gray-100">
    <div class="max-w-[1280px] mx-auto px-8 py-3 flex items-center justify-start space-x-12">
      <a class="subnav-link text-primary font-bold text-sm uppercase tracking-wider hover:text-pnj-brown transition-colors"
        href="home.html" data-page="home.html">
        Trang chủ
      </a>

      <a class="subnav-link text-primary font-bold text-sm uppercase tracking-wider hover:text-pnj-brown transition-colors"
        href="category.html" data-page="category.html">
        Danh sách sản phẩm
      </a>

      <a class="subnav-link text-primary font-bold text-sm uppercase tracking-wider hover:text-pnj-brown transition-colors"
        href="home.html#section-bestseller" data-page="home.html">
        Bán chạy
      </a>

      <a class="subnav-link text-primary font-bold text-sm uppercase tracking-wider hover:text-pnj-brown transition-colors"
        href="#">
        Khuyến mãi
      </a>
    </div>
  </div>
</header>
