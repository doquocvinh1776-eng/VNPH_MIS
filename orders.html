<body class="bg-[#f4f4f4] text-on-surface">

  <script src="header-init.js"></script>
  <script src="sidebar-init.js"></script>
  <div id="header2"></div>
  <script>
    fetch("header2.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("header2").innerHTML = data;
        initHeader();
      });
  </script>
  <main class="max-w-[1280px] mx-auto px-8 py-10 flex gap-8">

    <div id="sidebar-container"></div>
    <script>
      fetch("sidebar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sidebar-container").innerHTML = data;
          initSidebar();
        });
    </script>
    <!-- Main Content Area -->
    <section class="flex-1">
      <div class="bg-white border border-slate-300 shadow-sm rounded-sm overflow-hidden">

        <div class="px-8 py-4 border-b border-slate-200">
          <h1 class="text-lg font-bold text-slate-800 uppercase">
            Đơn hàng của tôi
          </h1>
        </div>

        <div class="flex border-b border-slate-200">
          <button data-status="Chờ xác nhận"
            class="order-tab-btn flex-1 py-4 flex flex-col items-center gap-1 border-b-2 border-primary text-primary transition-all">
            <span class="material-symbols-outlined text-2xl"
              style="font-variation-settings: &quot;FILL&quot; 1">pending_actions</span>
            <span class="text-xs font-medium">Chờ xác nhận</span>
          </button>
          <button data-status="Chờ lấy hàng"
            class="order-tab-btn flex-1 py-4 flex flex-col items-center gap-1 border-b-2 border-transparent hover:text-primary transition-all text-slate-500">
            <span class="material-symbols-outlined text-2xl">package_2</span>
            <span class="text-xs font-medium">Chờ lấy hàng</span>
          </button>
          <button data-status="Đang giao hàng"
            class="order-tab-btn flex-1 py-4 flex flex-col items-center gap-1 border-b-2 border-transparent hover:text-primary transition-all text-slate-500">
            <span class="material-symbols-outlined text-2xl">local_shipping</span>
            <span class="text-xs font-medium">Đang giao</span>
          </button>
          <button data-status="Đã giao"
            class="order-tab-btn flex-1 py-4 flex flex-col items-center gap-1 border-b-2 border-transparent hover:text-primary transition-all text-slate-500">
            <span class="material-symbols-outlined text-2xl">star</span>
            <span class="text-xs font-medium">Đánh giá</span>
          </button>
        </div>
        <div class="p-6" id="order-list-container">

          <div class="text-center py-12 text-slate-400" id="empty-state">
            <span class="material-symbols-outlined text-5xl mb-2">shopping_basket</span>
            <p class="text-sm">Chưa có đơn hàng nào</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
  <script>

    function deductStockForOrder(order) {

      let adminProducts = JSON.parse(localStorage.getItem("vnph_products") || "[]");

      let dbProducts = JSON.parse(localStorage.getItem("vnph_products_db") || "[]");

      for (let item of order.items) {
        const qty = parseInt(item.quantity) || 1;


        let adminP = adminProducts.find(p => p.sku === item.id || p.name === item.title);
        if (adminP) {
          adminP.stock = Math.max(0, (parseInt(adminP.stock) || 0) - qty);
        }


        let dbP = dbProducts.find(p => p.id === item.id);
        if (dbP) {
          dbP.stock = Math.max(0, (parseInt(dbP.stock) || 0) - qty);
        }
      }

      localStorage.setItem("vnph_products", JSON.stringify(adminProducts));
      localStorage.setItem("vnph_products_db", JSON.stringify(dbProducts));
    }


    function restoreStockForOrder(order) {
      let adminProducts = JSON.parse(localStorage.getItem("vnph_products") || "[]");
      let dbProducts = JSON.parse(localStorage.getItem("vnph_products_db") || "[]");

      for (let item of order.items) {
        const qty = parseInt(item.quantity) || 1;

        let adminP = adminProducts.find(p => p.sku === item.id || p.name === item.title);
        if (adminP) {
          adminP.stock = (parseInt(adminP.stock) || 0) + qty;
        }

        let dbP = dbProducts.find(p => p.id === item.id);
        if (dbP) {
          dbP.stock = (parseInt(dbP.stock) || 0) + qty;
        }
      }

      localStorage.setItem("vnph_products", JSON.stringify(adminProducts));
      localStorage.setItem("vnph_products_db", JSON.stringify(dbProducts));
    }

    function cancelOrder(orderId) {
      if (!confirm("Bạn có chắc muốn hủy đơn hàng này không?")) return;

      let orders = JSON.parse(localStorage.getItem("vnph_orders") || "[]");
      let orderIndex = orders.findIndex(o => o.id === orderId);
      if (orderIndex === -1) return;

      let order = orders[orderIndex];
      const oldStatus = order.status;


      if (order.stockDeducted) {
        restoreStockForOrder(order);
        alert("Đơn hàng đã hủy. Tồn kho đã được hoàn trả.");
      } else {
        alert("Đơn hàng đã hủy.");
      }

      orders[orderIndex] = { ...order, status: "Đã hủy", stockDeducted: false };
      localStorage.setItem("vnph_orders", JSON.stringify(orders));
      location.reload();
    }

    function confirmOrder(orderId) {
      let orders = JSON.parse(localStorage.getItem("vnph_orders") || "[]");
      let adminProducts = JSON.parse(localStorage.getItem("vnph_products") || "[]");

      let orderIndex = orders.findIndex(o => o.id === orderId);
      if (orderIndex === -1) return;

      let order = orders[orderIndex];


      let isEnoughStock = true;
      for (let item of order.items) {
        let prod = adminProducts.find(p => p.name === item.title || p.sku === item.id);
        if (prod) {
          if (parseInt(prod.stock) < parseInt(item.quantity)) {
            isEnoughStock = false;
            break;
          }
        }
      }

      if (isEnoughStock) {
        order.status = "Đang giao hàng";

        deductStockForOrder(order);
        order.stockDeducted = true;
        alert("Đủ hàng! Tồn kho đã được cập nhật. Đơn hàng chuyển sang 'Đang giao hàng'.");
      } else {
        order.status = "Chờ lấy hàng";
        alert("Không đủ tồn kho! Đơn hàng chuyển sang 'Chờ lấy hàng' để cập nhật lên admin.");
      }

      orders[orderIndex] = order;
      localStorage.setItem("vnph_orders", JSON.stringify(orders));
      location.reload();
    }

    function clientConfirmDelivery(orderId) {
      let orders = JSON.parse(localStorage.getItem("vnph_orders") || "[]");
      let orderIndex = orders.findIndex(o => o.id === orderId);
      if (orderIndex === -1) return;

      orders[orderIndex].clientConfirmed = true;

      if (orders[orderIndex].adminConfirmed) {
        orders[orderIndex].status = "Đã giao";
        alert("Cả bạn và Admin đều đã xác nhận! Đơn hàng đã hoàn tất (Đã giao).");
      } else {
        alert("Đã ghi nhận bạn nhận được hàng. Đang chờ Admin xác nhận từ hệ thống để hoàn tất.");
      }

      localStorage.setItem("vnph_orders", JSON.stringify(orders));
      location.reload();
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tabBtns = document.querySelectorAll(".order-tab-btn");
      let currentStatus = "Chờ xác nhận";

      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {

          tabBtns.forEach((b) => {
            b.classList.remove("border-primary", "text-primary");
            b.classList.add("border-transparent", "text-slate-500");
            const icon = b.querySelector(".material-symbols-outlined");
            icon.style.fontVariationSettings = "";
          });

          btn.classList.add("border-primary", "text-primary");
          btn.classList.remove("border-transparent", "text-slate-500");
          const icon = btn.querySelector(".material-symbols-outlined");
          icon.style.fontVariationSettings = '"FILL" 1';

          currentStatus = btn.getAttribute("data-status");
          renderOrdersByTab(currentStatus);
        });
      });

      function renderOrdersByTab(statusTab) {
        const container = document.getElementById("order-list-container");
        const allOrders = JSON.parse(localStorage.getItem("vnph_orders") || "[]");
        const oldProducts = JSON.parse(localStorage.getItem("checkoutProducts") || "[]");

        let orders = allOrders.filter(o => {
          if (statusTab === "Đã giao") return o.status === "Đã giao" || o.status === "Đã hủy";
          return o.status === statusTab;
        });

        if (orders.length === 0 && (statusTab !== "Đã giao" || oldProducts.length === 0)) {
          container.innerHTML = `
              <div class="text-center py-12 text-slate-400" id="empty-state">
                <span class="material-symbols-outlined text-5xl mb-2">shopping_basket</span>
                <p class="text-sm">Chưa có đơn hàng nào</p>
              </div>
            `;
          return;
        }

        container.innerHTML = "";
        orders.forEach((order) => {
          const isCancelled = order.status === "Đã hủy";
          const div = document.createElement("div");
          div.className = "border border-slate-200 rounded p-4 mb-4 bg-white";

          div.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <div>
              <p class="font-bold text-[#2B427D]">Mã đơn: ${order.id}</p>
              <p class="text-xs text-gray-500">${order.date}</p>
              <p class="text-xs font-semibold mt-1 ${isCancelled ? "text-red-500" : "text-green-600"}">
                ${order.status}
                ${order.clientConfirmed && order.status !== 'Đã giao' ? " (Khách đã nhận)" : ""}
                ${order.adminConfirmed && order.status !== 'Đã giao' ? " (Admin đã giao)" : ""}
              </p>
            </div>

            <div class="flex flex-col items-end gap-2">
              <div class="text-red-600 font-bold">
                ${Number(order.total || 0).toLocaleString("vi-VN")}đ
              </div>
              <div class="flex gap-2">
                ${order.status === "Chờ xác nhận"
              ? `<button
                    onclick="confirmOrder('${order.id}')"
                    class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                    Xác nhận đơn
                  </button>
                  <button
                    onclick="cancelOrder('${order.id}')"
                    class="text-xs px-3 py-1 border border-red-400 text-red-500 rounded hover:bg-red-50 transition-colors">
                    Hủy đơn
                  </button>`
              : ""
            }
                ${order.status === "Đang giao hàng" && !order.clientConfirmed
              ? `<button
                    onclick="clientConfirmDelivery('${order.id}')"
                    class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 transition-colors">
                    Đã nhận được hàng
                  </button>`
              : ""
            }
                ${order.status === "Đã giao"
              ? `<button onclick="alert('Cảm ơn bạn đã đánh giá!')" class="text-xs px-3 py-1 bg-orange-500 text-white rounded hover:bg-orange-600 transition-colors">
                        Đánh giá sản phẩm
                      </button>`
              : ""
            }
                ${isCancelled
              ? `<span class="text-xs px-3 py-1 bg-red-50 text-red-400 rounded border border-red-200">Đã hủy</span>`
              : ""
            }
              </div>
            </div>
          </div>

          ${order.items
              .map(
                (item) => `
                <div class="flex gap-3 border-t pt-2 mt-2 ${isCancelled ? "opacity-50" : ""}">
                  <img src="${item.img || ""}" class="w-16 h-16 object-cover"/>
                  <div>
                    <p class="text-sm font-bold">${item.title}</p>
                    <p class="text-xs text-gray-500">Mã: ${item.id || "N/A"}</p>
                    <p class="text-xs text-gray-500">SL: ${item.quantity || 1}</p>
                  </div>
                </div>
              `,
              )
              .join("")}
        `;

          container.appendChild(div);
        });

        if (statusTab === "Đã giao" && oldProducts.length > 0) {
          const oldDiv = document.createElement("div");
          oldDiv.className =
            "border border-slate-200 rounded p-4 mb-4 bg-white";

          oldDiv.innerHTML = oldProducts
            .map(
              (item) => `
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-xs text-gray-500">Đơn hàng cũ</p>
                  <p class="text-xs font-semibold mt-1 text-green-600">Đã giao</p>
                </div>
                <button onclick="alert('Cảm ơn bạn đã đánh giá!')" class="text-xs px-3 py-1 bg-orange-500 text-white rounded hover:bg-orange-600 transition-colors">
                  Đánh giá sản phẩm
                </button>
              </div>
              <div class="flex gap-3 border-t pt-2 mt-2">
                <img src="${item.img || ""}" class="w-16 h-16 object-cover"/>
                <div>
                  <p class="text-sm font-bold">${item.title}</p>
                  <p class="text-xs text-gray-500">Mã: ${item.id || "N/A"}</p>
                  <p class="text-xs text-gray-500">SL: ${item.quantity || 1}</p>
                </div>
              </div>
            `,
            )
            .join("");

          container.appendChild(oldDiv);
        }
      }

      renderOrdersByTab(currentStatus);
    });
  </script>

  <script src="products.js"></script>
  <script src="search-global.js"></script>
</body>
